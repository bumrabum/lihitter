<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lihitter — checklist</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f4f4f5;
            color: #18181b;
            min-height: 100vh;
        }

        /* ── Nav ── */
        header {
            background: #0a66c2;
            color: #fff;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header .brand {
            display: flex;
            flex-direction: column;
        }

        header h1 {
            font-size: 1.15rem;
            font-weight: 700;
        }

        header .subtitle {
            font-size: 0.8rem;
            opacity: 0.75;
            margin-top: 2px;
        }

        header nav {
            display: flex;
            gap: 6px;
        }

        header nav a {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 6px 14px;
            border-radius: 6px;
            transition: background 0.12s, color 0.12s;
        }

        header nav a:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        header nav a.active {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-weight: 600;
        }

        /* ── Layout ── */
        .layout {
            padding: 24px 28px;
        }

        /* ── Card ── */
        .card {
            background: #f4f4f5;
            border-radius: 10px;
            overflow: hidden;
        }

        .card-header {
            padding: 14px 18px;
            border-bottom: 1px solid #e4e4e7;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .card-header h2 {
            font-size: 0.92rem;
            font-weight: 700;
            color: #18181b;
        }

        .card-body {
            padding: 16px 18px;
        }

        /* ── Buttons ── */
        .btn {
            padding: 7px 14px;
            border-radius: 6px;
            border: 1px solid transparent;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.12s;
            white-space: nowrap;
        }

        .btn-primary {
            background: #0a66c2;
            color: #fff;
            border-color: #0a66c2;
        }

        .btn-primary:hover {
            background: #0958a8;
        }

        .btn-ghost {
            background: transparent;
            color: #52525b;
            border-color: #d4d4d8;
        }

        .btn-ghost:hover {
            background: #f4f4f5;
        }

        .btn-danger {
            background: #fee2e2;
            color: #b91c1c;
            border-color: #fca5a5;
        }

        .btn-danger:hover {
            background: #fecaca;
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 0.78rem;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── Check items list ── */
        .check-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px 0;
        }

        .check-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 14px;
            align-items: start;
            background: #fff;
            border: 1px solid #e4e4e7;
            border-radius: 8px;
            padding: 16px;
        }

        .check-item-toggle {
            flex-shrink: 0;
            margin-top: 8px;
            cursor: pointer;
            accent-color: #0a66c2;
            width: 15px;
            height: 15px;
        }

        .check-item-body {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
        }

        .row-label-input {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #d4d4d8;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            outline: none;
            transition: border-color 0.12s;
        }

        .row-label-input:focus {
            border-color: #0a66c2;
            box-shadow: 0 0 0 2px #0a66c218;
        }

        .check-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 800px) {
            .check-fields {
                grid-template-columns: 1fr;
            }
        }

        .check-field>label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #a1a1aa;
            margin-bottom: 5px;
        }

        .check-field textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #d4d4d8;
            border-radius: 6px;
            font-size: 0.82rem;
            font-family: inherit;
            resize: vertical;
            min-height: 90px;
            line-height: 1.55;
            outline: none;
            transition: border-color 0.12s;
        }

        .check-field textarea:focus {
            border-color: #0a66c2;
            box-shadow: 0 0 0 2px #0a66c218;
        }

        .check-item-actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-top: 2px;
        }

        .check-item.disabled .row-label-input {
            color: #a1a1aa;
        }

        .check-item.disabled .check-field textarea {
            color: #a1a1aa;
        }

        /* ── Label row with stats ── */
        .check-item-label-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .check-item-label-row .row-label-input {
            flex: 1;
        }

        .stat-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 9px;
            border-radius: 100px;
            font-size: 0.72rem;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .pass-stat {
            background: #dcfce7;
            color: #15803d;
        }

        .fail-stat {
            background: #fee2e2;
            color: #b91c1c;
        }

        .no-stat {
            background: #f4f4f5;
            color: #a1a1aa;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #52525b;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 8px 11px;
            border: 1px solid #d4d4d8;
            border-radius: 6px;
            font-size: 0.875rem;
            outline: none;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.12s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #0a66c2;
            box-shadow: 0 0 0 2px #0a66c218;
        }

        .form-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        /* ── JD selector ── */
        .jd-selector {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .jd-selector select {
            flex: 1;
            min-width: 200px;
            padding: 7px 11px;
            border: 1px solid #d4d4d8;
            border-radius: 6px;
            font-size: 0.875rem;
            background: #fff;
            outline: none;
            cursor: pointer;
        }

        .jd-selector select:focus {
            border-color: #0a66c2;
            box-shadow: 0 0 0 2px #0a66c218;
        }

        /* ── Results table ── */
        .results-empty {
            padding: 48px 20px;
            text-align: center;
            color: #a1a1aa;
            font-size: 0.875rem;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .results-table th {
            padding: 9px 14px;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #71717a;
            background: #f9f9fa;
            border-bottom: 1px solid #e4e4e7;
        }

        .results-table td {
            padding: 12px 14px;
            border-bottom: 1px solid #f0f0f1;
            vertical-align: top;
        }

        .results-table tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }

        .badge.pass {
            background: #dcfce7;
            color: #15803d;
        }

        .badge.fail {
            background: #fee2e2;
            color: #b91c1c;
        }

        .badge.pending {
            background: #f4f4f5;
            color: #71717a;
        }

        .reasoning-text {
            font-size: 0.82rem;
            color: #52525b;
            margin-top: 2px;
            line-height: 1.5;
        }

        .check-label-cell {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #d4d4d8;
            border-top-color: #0a66c2;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Modal ── */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: #00000050;
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-backdrop.open {
            display: flex;
        }

        .modal {
            background: #fff;
            border-radius: 10px;
            width: min(520px, 95vw);
            box-shadow: 0 8px 32px #0003;
            overflow: hidden;
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e4e4e7;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            font-size: 1rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #71717a;
            padding: 2px 6px;
        }

        .modal-close:hover {
            color: #18181b;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 14px 20px;
            border-top: 1px solid #e4e4e7;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .ran-at {
            font-size: 0.75rem;
            color: #a1a1aa;
            margin-top: 6px;
        }
    </style>
</head>

<body>

    <header>
        <div class="brand">
            <h1>lihitter</h1>
            <div class="subtitle">JD checklist</div>
        </div>
        <nav>
            <a href="/">Jobs</a>
            <a href="/checklist" class="active">Checklist</a>
            <a href="/settings">Settings</a>
        </nav>
    </header>

    <div class="layout">

        <!-- ── Quick mode toggle ── -->
        <div style="margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="quick-mode"
                style="accent-color: #0a66c2; width: 15px; height: 15px; cursor: pointer;" />
            <label for="quick-mode"
                style="font-size: 0.875rem; font-weight: 500; cursor: pointer; color: #18181b;">Quick mode</label>
            <span style="font-size: 0.78rem; color: #71717a;">— runs all checks in a single prompt</span>
        </div>

        <!-- ── Left: Check manager ── -->
        <div>
            <div class="card">
                <div class="card-header">
                    <h2>Checks</h2>
                    <button class="btn btn-primary btn-sm" id="btn-add-check">+ Add check</button>
                </div>
                <div class="card-body" style="padding: 0 18px;">
                    <ul class="check-list" id="check-list">
                        <li style="padding:24px 0; text-align:center; color:#a1a1aa; font-size:0.875rem;">Loading…</li>
                    </ul>
                </div>
            </div>
        </div>

    </div>

    <!-- ── Add/Edit modal ── -->
    <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Add check</h3>
                <button class="modal-close" id="modal-close">&#x2715;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="f-label">Label <span style="color:#71717a;font-weight:400">(short name)</span></label>
                    <input type="text" id="f-label" placeholder="e.g. No hybrid" maxlength="80" />
                </div>
                <div class="form-group">
                    <label for="f-prompt">Prompt <span style="color:#71717a;font-weight:400">(sent to LLM — end with
                            PASS/FAIL instruction)</span></label>
                    <textarea id="f-prompt" rows="6"
                        placeholder="e.g. Check the location. Return FAIL if hybrid is mentioned, PASS otherwise."></textarea>
                </div>
                <div class="form-group">
                    <label for="f-system-prompt">
                        System prompt
                        <span style="color:#71717a;font-weight:400">(optional — overrides default)</span>
                        <button type="button" id="btn-load-default-sp" class="btn btn-ghost btn-sm"
                            style="margin-left:8px;font-size:0.72rem;padding:2px 8px;">Load default</button>
                    </label>
                    <textarea id="f-system-prompt" rows="5"
                        placeholder="Leave blank to use the global default system prompt."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
                <button class="btn btn-primary" id="modal-save">Save</button>
            </div>
        </div>
    </div>

    <script>
        let checks = [];
        let stats = {};

        // ── Escape ──────────────────────────────────────────────────────────────────
        function esc(str) {
            return String(str || '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ── Load checks ─────────────────────────────────────────────────────────────
        async function loadChecks() {
            const [res, statsRes] = await Promise.all([
                fetch('/api/checklist/items'),
                fetch('/api/checklist/stats')
            ]);
            checks = await res.json();
            stats = await statsRes.json();
            renderChecks();
        }

        function renderChecks() {
            const list = document.getElementById('check-list');
            if (!checks.length) {
                list.innerHTML = '<li style="padding:24px 0;text-align:center;color:#a1a1aa;font-size:0.875rem;">No checks yet. Add one above.</li>';
                return;
            }
            list.innerHTML = checks.map(c => {
                const s = stats[c.id] || { pass: 0, fail: 0 };
                const total = s.pass + s.fail;
                return `
      <li class="check-item ${c.enabled ? '' : 'disabled'}" data-id="${c.id}">
        <input type="checkbox" class="check-item-toggle" ${c.enabled ? 'checked' : ''} data-id="${c.id}" title="Enable/disable" />
        <div class="check-item-body">
          <div class="check-item-label-row">
            <input class="row-label-input" value="${esc(c.label)}" placeholder="Label" data-field="label" />
            ${total > 0 ? `<span class="stat-badge pass-stat" title="Passed">✔ ${s.pass}</span><span class="stat-badge fail-stat" title="Failed">✘ ${s.fail}</span>` : '<span class="stat-badge no-stat">no runs</span>'}
          </div>
          <div class="check-fields">
            <div class="check-field">
              <label>Prompt</label>
              <textarea data-field="prompt" rows="4">${esc(c.prompt)}</textarea>
            </div>
            <div class="check-field">
              <label>System prompt <button type="button" class="btn btn-ghost btn-sm load-sp-btn" style="font-size:0.68rem;padding:1px 7px;">Load default</button></label>
              <textarea data-field="system_prompt" rows="4">${esc(c.system_prompt || '')}</textarea>
            </div>
          </div>
        </div>
        <div class="check-item-actions">
          <button class="btn btn-primary btn-sm update-btn" data-id="${c.id}">Update</button>
          <button class="btn btn-danger btn-sm del-btn" data-id="${c.id}">Del</button>
        </div>
      </li>
    `}).join('');

            list.querySelectorAll('.check-item-toggle').forEach(cb => {
                cb.addEventListener('change', async () => {
                    const id = Number(cb.dataset.id);
                    await fetch(`/api/checklist/items/${id}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ enabled: cb.checked })
                    });
                    const check = checks.find(c => c.id === id);
                    if (check) check.enabled = cb.checked;
                    cb.closest('li').classList.toggle('disabled', !cb.checked);
                });
            });

            list.querySelectorAll('.update-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = Number(btn.dataset.id);
                    const li = btn.closest('li');
                    const label = li.querySelector('[data-field="label"]').value.trim();
                    const prompt = li.querySelector('[data-field="prompt"]').value.trim();
                    const system_prompt = li.querySelector('[data-field="system_prompt"]').value.trim();
                    if (!label || !prompt) { alert('Label and prompt are required.'); return; }
                    btn.disabled = true; btn.textContent = 'Saving…';
                    await fetch(`/api/checklist/items/${id}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ label, prompt, system_prompt })
                    });
                    const check = checks.find(c => c.id === id);
                    if (check) { check.label = label; check.prompt = prompt; check.system_prompt = system_prompt; }
                    btn.disabled = false; btn.textContent = 'Update';
                });
            });

            list.querySelectorAll('.load-sp-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    btn.disabled = true; btn.textContent = 'Loading…';
                    try {
                        const res = await fetch('/api/checklist/default-system-prompt');
                        const data = await res.json();
                        btn.closest('.check-field').querySelector('textarea').value = data.prompt || '';
                    } finally { btn.disabled = false; btn.textContent = 'Load default'; }
                });
            });

            list.querySelectorAll('.del-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = Number(btn.dataset.id);
                    const check = checks.find(c => c.id === id);
                    if (!confirm(`Delete check "${check?.label}"?`)) return;
                    await fetch(`/api/checklist/items/${id}`, { method: 'DELETE' });
                    await loadChecks();
                });
            });
        }

        // ── Modal ────────────────────────────────────────────────────────────────────
        function openModal() {
            document.getElementById('f-label').value = '';
            document.getElementById('f-prompt').value = '';
            document.getElementById('f-system-prompt').value = '';
            document.getElementById('modal-backdrop').classList.add('open');
            document.getElementById('f-label').focus();
        }

        function closeModal() {
            document.getElementById('modal-backdrop').classList.remove('open');
        }

        document.getElementById('btn-add-check').addEventListener('click', openModal);
        document.getElementById('modal-close').addEventListener('click', closeModal);
        document.getElementById('modal-cancel').addEventListener('click', closeModal);
        document.getElementById('modal-backdrop').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        document.getElementById('modal-save').addEventListener('click', async () => {
            const label = document.getElementById('f-label').value.trim();
            const prompt = document.getElementById('f-prompt').value.trim();
            const system_prompt = document.getElementById('f-system-prompt').value.trim();
            if (!label || !prompt) {
                alert('Both label and prompt are required.');
                return;
            }

            const btn = document.getElementById('modal-save');
            btn.disabled = true;
            btn.textContent = 'Saving…';

            await fetch('/api/checklist/items', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ label, prompt, system_prompt })
            });

            btn.disabled = false;
            btn.textContent = 'Save';
            closeModal();
            await loadChecks();
        });

        // ── Load default system prompt ───────────────────────────────────────────────
        document.getElementById('btn-load-default-sp').addEventListener('click', async () => {
            const btn = document.getElementById('btn-load-default-sp');
            btn.disabled = true;
            btn.textContent = 'Loading…';
            try {
                const res = await fetch('/api/checklist/default-system-prompt');
                const data = await res.json();
                document.getElementById('f-system-prompt').value = data.prompt || '';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Load default';
            }
        });

        // ── Quick mode ──────────────────────────────────────────────────────────────
        const quickModeEl = document.getElementById('quick-mode');
        fetch('/api/settings/quick-mode')
            .then(r => r.json())
            .then(d => { quickModeEl.checked = !!d.quickMode; });
        quickModeEl.addEventListener('change', () => {
            fetch('/api/settings/quick-mode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ quickMode: quickModeEl.checked })
            });
        });

        // ── Init ─────────────────────────────────────────────────────────────────────
        loadChecks();
    </script>
</body>

</html>
